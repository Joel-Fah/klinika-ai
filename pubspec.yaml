name: klinika_ai
description: Adaptive patient intake powered by Flutter GenUI - Google I/O Extended Yaounde 2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.44.3'

dependencies:
  flutter:
    sdk: flutter

  genui: ^0.9.0
  json_schema_builder: ^0.1.3

  firebase_core: ^3.13.0
  firebase_ai: ^2.3.0

  get: ^4.6.6
  go_router: ^15.1.2

  flutter_animate: ^4.5.2

  gap: ^3.0.1
  hugeicons: ^0.0.7

  logging: ^1.3.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
