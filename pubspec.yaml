name: klinika_ai
description: Adaptive patient intake powered by Flutter GenUI - Google I/O Extended Yaounde 2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.44.3'

dependencies:
  flutter:
    sdk: flutter

  genui: ^0.9.0
  json_schema_builder: ^0.1.3

  firebase_core: ^3.13.0
  firebase_ai: ^2.3.0

  get: ^4.6.6
  go_router: ^15.1.2

  flutter_animate: ^4.5.2

  gap: ^3.0.1
  hugeicons: ^0.0.7

  logging: ^1.3.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#00A374"
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"
    color_dark: "#00A374"
    image: "assets/images/app/android12_splash.png"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/images/app/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "assets/images/app/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#00C48C"
  windows:
    generate: true
    image_path: "assets/images/app/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/app/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/app/
    - assets/lottie/
